training:
  num_epochs: 3
  learning_rate: 2e-4
  warmup_ratio: 0.03
  lr_scheduler: cosine
  max_seq_length: 24000
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  logging_steps: 100
  eval_steps: 500
  save_steps: 500
  save_total_limit: 1
  seed: 42

peft:
  method: lora
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: none

data:
  total_samples: 4000
  english_ratios: [0.1, 0.2, 0.3, 0.5, 0.7, 0.9]
  prompt_template: "### Instruction:\n<|tgt_lang:{language}|> {instruction}\n\n### Response:\n{response}"
