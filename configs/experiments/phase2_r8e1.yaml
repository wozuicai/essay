training:
  num_epochs: 1
  learning_rate: 2e-4
  warmup_ratio: 0.03
  lr_scheduler: cosine
  max_seq_length: 24000
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 8
  gradient_checkpointing: true
  logging_steps: 20
  save_steps: 500
  save_total_limit: 1
  seed: 42

peft:
  method: lora
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: none

data:
  prompt_template: "### Instruction:\n<|tgt_lang:{language}|> {instruction}\n\n### Response:\n{response}"
